name: Playwright E2E Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run tests daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Type of tests to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - smoke
          - regression
          - accessibility
          - performance
      browser:
        description: 'Browser to test'
        required: false
        default: 'chromium'
        type: choice
        options:
          - chromium
          - firefox
          - webkit
          - all

env:
  NODE_VERSION: '18'
  PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/playwright-browsers

jobs:
  install:
    name: Install Dependencies
    runs-on: ubuntu-latest
    outputs:
      cache-key: ${{ steps.cache.outputs.cache-hit }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: cache
        uses: actions/cache@v3
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        if: steps.cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 \
            libatk-bridge2.0-0 \
            libdrm2 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            libgbm1 \
            libxss1 \
            libasound2

  lint-and-type-check:
    name: Lint and Type Check
    runs-on: ubuntu-latest
    needs: install
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run type check
        run: npm run type-check:full

      - name: Check formatting
        run: npm run format:check

  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: install
    if: github.event.inputs.test_type == 'smoke' || github.event.inputs.test_type == 'all' || github.event.inputs.test_type == ''
    
    strategy:
      matrix:
        browser: [chromium]
        
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Restore Playwright browsers
        uses: actions/cache@v3
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Start services
        run: |
          npm run launch:backend &
          npm run launch:frontend &
          sleep 10

      - name: Run smoke tests
        run: npx playwright test tests/e2e/smoke --browser=${{ matrix.browser }} --reporter=list
        env:
          CI: true
          NODE_ENV: test

      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: smoke-test-results-${{ matrix.browser }}
          path: |
            test-results/
            playwright-report/

  accessibility-tests:
    name: Accessibility Tests
    runs-on: ubuntu-latest
    needs: install
    if: github.event.inputs.test_type == 'accessibility' || github.event.inputs.test_type == 'all' || github.event.inputs.test_type == ''
    
    strategy:
      matrix:
        browser: [chromium]
        
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Restore Playwright browsers
        uses: actions/cache@v3
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Install axe-core
        run: npm install --save-dev @axe-core/playwright

      - name: Start services
        run: |
          npm run launch:backend &
          npm run launch:frontend &
          sleep 10

      - name: Run accessibility tests
        run: npx playwright test tests/e2e/accessibility --browser=${{ matrix.browser }} --reporter=list
        env:
          CI: true
          NODE_ENV: test

      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: accessibility-test-results-${{ matrix.browser }}
          path: |
            test-results/
            playwright-report/

  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: install
    if: github.event.inputs.test_type == 'performance' || github.event.inputs.test_type == 'all' || github.event.inputs.test_type == ''
    
    strategy:
      matrix:
        browser: [chromium]
        
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Restore Playwright browsers
        uses: actions/cache@v3
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Start services
        run: |
          npm run launch:backend &
          npm run launch:frontend &
          sleep 10

      - name: Run performance tests
        run: npx playwright test tests/e2e/performance --browser=${{ matrix.browser }} --reporter=list
        env:
          CI: true
          NODE_ENV: test

      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: performance-test-results-${{ matrix.browser }}
          path: |
            test-results/
            playwright-report/

  regression-tests:
    name: Regression Tests
    runs-on: ubuntu-latest
    needs: install
    if: github.event.inputs.test_type == 'regression' || github.event.inputs.test_type == 'all' || github.event.inputs.test_type == ''
    
    strategy:
      matrix:
        browser: [chromium, firefox, webkit]
        fail-fast: false
        
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Restore Playwright browsers
        uses: actions/cache@v3
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Start services
        run: |
          npm run launch:backend &
          npm run launch:frontend &
          sleep 10

      - name: Run regression tests
        run: npx playwright test tests/e2e/regression --browser=${{ matrix.browser }} --reporter=list
        env:
          CI: true
          NODE_ENV: test

      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: regression-test-results-${{ matrix.browser }}
          path: |
            test-results/
            playwright-report/

  full-suite:
    name: Full Test Suite
    runs-on: ubuntu-latest
    needs: install
    if: github.event.inputs.test_type == 'all' || github.event.inputs.test_type == ''
    
    strategy:
      matrix:
        browser: [chromium, firefox, webkit]
        fail-fast: false
        
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Restore Playwright browsers
        uses: actions/cache@v3
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Start services
        run: |
          npm run launch:backend &
          npm run launch:frontend &
          sleep 10

      - name: Run full test suite
        run: npx playwright test --browser=${{ matrix.browser }} --reporter=html
        env:
          CI: true
          NODE_ENV: test

      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: full-test-results-${{ matrix.browser }}
          path: |
            test-results/
            playwright-report/

      - name: Upload screenshots
        uses: actions/upload-artifact@v3
        if: failure()
        with:
          name: screenshots-${{ matrix.browser }}
          path: test-results/screenshots/

  mobile-tests:
    name: Mobile Tests
    runs-on: ubuntu-latest
    needs: install
    if: github.event.inputs.test_type == 'all' || github.event.inputs.test_type == ''
    
    strategy:
      matrix:
        device: [Pixel 5, iPhone 12]
        
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Restore Playwright browsers
        uses: actions/cache@v3
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Start services
        run: |
          npm run launch:backend &
          npm run launch:frontend &
          sleep 10

      - name: Run mobile tests
        run: npx playwright test tests/e2e/mobile --device="${{ matrix.device }}" --reporter=list
        env:
          CI: true
          NODE_ENV: test

      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: mobile-test-results-${{ matrix.device }}
          path: |
            test-results/
            playwright-report/

  security-tests:
    name: Security Tests
    runs-on: ubuntu-latest
    needs: install
    if: github.event.inputs.test_type == 'all' || github.event.inputs.test_type == ''
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Restore Playwright browsers
        uses: actions/cache@v3
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Start services
        run: |
          npm run launch:backend &
          npm run launch:frontend &
          sleep 10

      - name: Run security tests
        run: npx playwright test tests/e2e/security --browser=chromium --reporter=list
        env:
          CI: true
          NODE_ENV: test

      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: security-test-results
          path: |
            test-results/
            playwright-report/

  test-report:
    name: Test Report
    runs-on: ubuntu-latest
    needs: [smoke-tests, accessibility-tests, performance-tests, regression-tests, full-suite, mobile-tests, security-tests]
    if: always()
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v3
        with:
          path: artifacts/

      - name: Merge test reports
        run: |
          mkdir -p merged-report
          find artifacts/ -name "*.json" -exec cp {} merged-report/ \;
          npx playwright merge-reports merged-report/

      - name: Upload merged report
        uses: actions/upload-artifact@v3
        with:
          name: merged-test-report
          path: merged-report/

      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            // Read test results
            const resultsPath = path.join(process.cwd(), 'merged-report', 'results.json');
            let summary = '## 🧪 Test Results\n\n';
            
            if (fs.existsSync(resultsPath)) {
              const results = JSON.parse(fs.readFileSync(resultsPath, 'utf8'));
              const total = results.suites.reduce((acc, suite) => acc + suite.specs.length, 0);
              const passed = results.suites.reduce((acc, suite) => 
                acc + suite.specs.filter(spec => spec.ok).length, 0);
              const failed = total - passed;
              
              summary += `**Total Tests:** ${total}\n`;
              summary += `**✅ Passed:** ${passed}\n`;
              summary += `**❌ Failed:** ${failed}\n`;
              summary += `**📊 Success Rate:** ${((passed / total) * 100).toFixed(1)}%\n\n`;
            }
            
            summary += '### Test Categories\n';
            summary += '- ✅ Smoke Tests\n';
            summary += '- ✅ Accessibility Tests\n';
            summary += '- ✅ Performance Tests\n';
            summary += '- ✅ Regression Tests\n';
            summary += '- ✅ Mobile Tests\n';
            summary += '- ✅ Security Tests\n\n';
            
            summary += '📊 [View detailed report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });

  cleanup:
    name: Cleanup
    runs-on: ubuntu-latest
    needs: [test-report]
    if: always()
    
    steps:
      - name: Cleanup test environment
        run: |
          echo "Cleaning up test environment..."
          # Add any cleanup commands here
          echo "Cleanup complete."