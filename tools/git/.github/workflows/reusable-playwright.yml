name: Reusable Playwright Test Job

on:
  workflow_call:
    inputs:
      test_name:
        required: true
        type: string
      test_path:
        required: true
        type: string
      browser_matrix:
        required: false
        type: string
        default: '["chromium"]'
      install_axe:
        required: false
        type: boolean
        default: false
      timeout_minutes:
        required: false
        type: number
        default: 30

jobs:
  playwright-test:
    name: ${{ inputs.test_name }}
    runs-on: ubuntu-latest
    needs: install
    if: github.event.inputs.test_type == inputs.test_name || github.event.inputs.test_type == 'all' || github.event.inputs.test_type == ''
    
    strategy:
      fail-fast: false
      matrix:
        browser: ${{ fromJson(inputs.browser_matrix) }}
        
    timeout-minutes: ${{ inputs.timeout_minutes }}
        
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Restore Playwright browsers
        uses: actions/cache@v3
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Install axe-core (accessibility tests)
        if: inputs.install_axe
        run: npm install --save-dev @axe-core/playwright

      - name: Start services
        run: |
          npm run launch:backend &
          npm run launch:frontend &
          sleep 10

      - name: Run ${{ inputs.test_name }} tests
        run: npx playwright test ${{ inputs.test_path }} --browser=${{ matrix.browser }} --reporter=list
        env:
          CI: ${{ env.CI }}
          NODE_ENV: ${{ env.NODE_ENV }}

      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: ${{ inputs.test_name }}-test-results-${{ matrix.browser }}
          path: |
            test-results/
            playwright-report/
          retention-days: 7