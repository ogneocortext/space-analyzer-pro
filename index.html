<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="description"
      content="Space Analyzer Pro 2026 - AI-powered disk space analysis and optimization tool with machine learning capabilities"
    />
    <meta name="theme-color" content="#0B0B0E" />
    <meta name="color-scheme" content="dark" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Content Security Policy for security -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' ws: localhost:8080 localhost:8081 localhost:8085 localhost:8082 localhost:8083 localhost:8084;"
    />
    <title>Space Analyzer Pro 2026 - AI-Powered Disk Space Analysis</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,600;9..144,800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap"
      rel="stylesheet"
      media="print"
      onload="
        this.media = 'all';
        document.documentElement.classList.add('font-loaded');
      "
    />
    <!-- Preload critical fonts for faster rendering -->
    <link
      rel="preload"
      href="https://fonts.gstatic.com/s/fraunces/v38/6NUh8FyLNQOQZAnv9bYEvDiIdE9Ea92uemAk_WBq8U_9v0c2Wa0K7iN7hzFUPJH58nib1603gg7S2nfgRYIctxujDg.woff2"

    />

      rel="preload"
      href="https://fonts.gstatic.com/s/dmsans/v15/rP2Hp2ywxg089UriCZOIHQ.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,600;9..144,800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap"
        rel="stylesheet"
      />
    </noscript>
    <style>
      /* Prevent flash of unstyled content - optimized */
      html {
        background-color: #0b0b0e;
        color: #e5e5e5;
      }
      body {
        background-color: #0b0b0e;
        color: #e5e5e5;
        opacity: 1;
        transition: none !important;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; /* System font fallback */
      }
      /* Optimize font loading transition */
      .font-loaded {
        transition: opacity 0.05s ease-in-out;
      }
      /* Critical CSS for immediate rendering */
      #app {
        width: 100%;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }
    </style>
    <noscript>
      <style>
        /* Fallback styles when JavaScript is disabled */
        body {
          background: #0b0b0e;
          color: #e5e5e5;
        }
        .app-container {
          padding: 2rem;
          text-align: center;
        }
      </style>
    </noscript>
  </head>
  <body>
    <!-- Vue app mount point -->
    <div id="app" role="application" aria-label="Space Analyzer Pro main application"></div>

    <script type="module" src="/src/main.ts"></script>
  </body>
