[build]
# Target Windows x64 MSVC
# target = "x86_64-pc-windows-msvc"

# Use native CPU features for maximum performance
# Note: Don't set LTO here - it's configured in Cargo.toml profile instead
rustflags = [
    "-C", "target-cpu=native",
    # Enable SIMD optimizations
    "-C", "target-feature=+avx2,+fma",
    # Link-time optimization settings
    "-C", "link-arg=-Wl,--gc-sections",
]

[target.x86_64-pc-windows-msvc]
# Use lld-linker for faster builds if available
# linker = "rust-lld.exe"
