[package]
name = "node_modules_cleaner"
version = "1.0.0"
edition = "2021"
authors = ["Space Analyzer Team"]
description = "High-performance node_modules cleanup and analysis tool"
license = "MIT"

[[bin]]
name = "node_modules_cleaner"
path = "src/main.rs"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
clap = { version = "4.0", features = ["derive"] }
walkdir = "2.3"
anyhow = "1.0"
chrono = { version = "0.4", features = ["serde"] }
rayon = "1.7"
num_cpus = "1.16"
regex = "1.5"
ignore = "0.4"

# Windows-specific dependencies for enhanced file operations
[target.'cfg(windows)'.dependencies]
windows-sys = { version = "0.59", features = [
    "Win32_Storage_FileSystem",
    "Win32_Foundation",
] }
